services:
  db:
    image: postgres:15
    container_name: workout_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: workout_backend
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - '8000:8000'
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: workout_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - '3000:3000'
    depends_on:
      - backend

  go-service:
    build: ./go-service
    container_name: workout_go
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
    ports:
      - '8001:8001'
    depends_on:
      - db

  rust-service:
    build: ./rust-service
    container_name: workout_rust
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
    ports:
      - '8002:8002'
    depends_on:
      - db

volumes:
  postgres_data:
